services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: airs_redcheck
      POSTGRES_USER: airs_redcheck
      POSTGRES_PASSWORD: airs_redcheck
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airs_redcheck -d airs_redcheck"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://airs_redcheck:airs_redcheck@db:5432/airs_redcheck
      APP_NAME: AI Response Threat Evaluator
      MAX_UPLOAD_BYTES: 26214400
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://airs_redcheck:airs_redcheck@db:5432/airs_redcheck
      APP_NAME: AI Response Threat Evaluator
      MAX_UPLOAD_BYTES: 26214400
      DEFAULT_RETRY_LIMIT: 2
      WORKER_POLL_SECONDS: 5
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: python -m app.workers.evaluation_worker

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
