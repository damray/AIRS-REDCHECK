project:
  name: ai-response-threat-evaluator
  version: v1
  product_goal: >
    Import red-teaming exports, independently evaluate whether model responses
    are threats, triage evaluator disagreements, and compute confirmed quality
    metrics only after human review.

conventions:
  statuses: [todo, in_progress, blocked, done]
  priorities: [must, should, could]
  rules:
    - Implement only one feature slice at a time.
    - Add or update tests for every behavior change.
    - Do not mark a feature done until its acceptance criteria pass.
    - Preserve source raw payloads.
    - Never expose secrets to frontend logs or application logs.

features:
  - id: F-001
    title: Repository scaffold
    priority: must
    status: done
    depends_on: []
    acceptance:
      - Docker Compose starts PostgreSQL and backend.
      - Backend exposes GET /health returning 200.
      - Backend tests run with one documented command.
      - Environment variables are documented in .env.example.

  - id: F-002
    title: Normalized persistence model
    priority: must
    status: done
    depends_on: [F-001]
    acceptance:
      - Database migrations create datasets, streams, attempts, import_errors.
      - Static records can be represented as one stream with one attempt.
      - Agent records can be represented as one stream with multiple attempts.
      - Raw source payloads are retained as JSONB.

  - id: F-003
    title: Static JSON parser
    priority: must
    status: done
    depends_on: [F-002]
    acceptance:
      - Parser accepts JSON array and single JSON object.
      - prompt, output, and threat are validated.
      - Optional metadata is retained.
      - Invalid records create import_errors without dropping valid records.
      - Unit tests cover success, partial failure, and malformed input.

  - id: F-004
    title: Agent JSON parser
    priority: must
    status: done
    depends_on: [F-002]
    acceptance:
      - Parser detects iteration_N keys dynamically.
      - Serialized iteration JSON strings are decoded.
      - Each valid iteration becomes one attempt.
      - Invalid iterations create import_errors without dropping valid iterations.
      - Unit tests cover success, missing fields, malformed iteration JSON, and mixed validity.

  - id: F-005
    title: Import API and summary
    priority: must
    status: done
    depends_on: [F-003, F-004]
    acceptance:
      - POST /datasets/import accepts CSV or JSON.
      - API returns detected format, stream count, attempt count, imported count, and error count.
      - Import errors can be listed through an API endpoint.
      - Maximum upload size is configurable.

  - id: F-006
    title: Flat custom mapping
    priority: should
    status: done
    depends_on: [F-005]
    acceptance:
      - User can map prompt, output, and source threat columns for flat files.
      - Optional fields can be mapped.
      - Mapping profile can be saved and reused.

  - id: F-007
    title: Portkey gateway profile
    priority: must
    status: done
    depends_on: [F-001]
    acceptance:
      - Backend stores gateway profile without exposing secrets through read APIs.
      - API key is masked in UI-facing responses.
      - Test connection endpoint returns actionable errors.
      - Logs never contain the API key.
      - Provider slug or config ID routing is supported.

  - id: F-008
    title: Blind Judge adapter
    priority: must
    status: done
    depends_on: [F-007]
    acceptance:
      - Judge receives prompt, output, rubric, and optional goal.
      - Judge never receives source verdict, source score, or source reasoning.
      - Structured response schema supports THREAT, SAFE, UNCERTAIN.
      - Invalid Judge responses are stored as evaluation errors.
      - Adapter has mocked unit tests.

  - id: F-009
    title: Persistent worker and retries
    priority: must
    status: done
    depends_on: [F-005, F-008]
    acceptance:
      - Jobs persist before execution.
      - Worker resumes pending jobs after restart.
      - Temporary errors retry with a configured limit.
      - Failed attempts can be retried selectively.
      - Status endpoint reports progress.

  - id: F-010
    title: Comparison engine
    priority: must
    status: done
    depends_on: [F-008]
    acceptance:
      - Comparison statuses match the PRD matrix.
      - UNCERTAIN creates REVIEW_REQUIRED.
      - Unit tests cover every matrix branch.

  - id: F-011
    title: Result explorer API
    priority: must
    status: done
    depends_on: [F-009, F-010]
    acceptance:
      - Results are filterable by comparison status, source verdict, Judge verdict, input type, category, severity, technique, and review decision.
      - Agent stream endpoint returns ordered attempt timeline.
      - Pagination is supported.

  - id: F-012
    title: Lightweight human adjudication
    priority: must
    status: done
    depends_on: [F-011]
    acceptance:
      - Reviewer can confirm source, confirm Judge, or mark alarm threat for low-impact unacceptable responses.
      - Reviewer comment, identity, and timestamp are persisted.
      - Reviewed quality metrics use only adjudicated records.

  - id: F-013
    title: Minimal web UI
    priority: must
    status: done
    depends_on: [F-005, F-011, F-012]
    acceptance:
      - User can upload a file and view import summary.
      - User can browse disagreements.
      - User can open attempt details.
      - User can adjudicate a disagreement.
      - User can view automated triage and reviewed quality summaries.

  - id: F-014
    title: Filtered export APIs
    priority: should
    status: done
    depends_on: [F-011, F-012]
    description: >
      Export results to CSV using the same filter model as the result explorer,
      so analysts can export specific working sets such as all agreed threats,
      all source-stricter disagreements, all reviewed high-severity cases, or a
      text-search subset once search is available.
    implementation_notes:
      - Reuse the GET /results/attempts filter semantics for export endpoints.
      - Support multiple comparison_status values in one export request.
      - Support source_verdict, judge_verdict, input_type, category, severity, technique, reviewed, review_decision, and stream_id filters.
      - Add an export-current-view path in the UI so the CSV reflects active filters rather than a hard-coded dataset.
      - Keep fixed convenience exports for normalized results, disagreements only, and reviewed cases if useful.
      - Use streamed CSV responses or batching before exporting very large datasets.
      - Do not mutate datasets, attempts, Judge results, reviews, jobs, or raw payloads during export.
    acceptance:
      - User can export normalized results.
      - User can export disagreements only.
      - User can export reviewed cases only.
      - User can export any filtered result set supported by the result explorer.
      - User can combine multiple filters in one export, such as comparison status plus source verdict plus severity.
      - User can export cases by human review decision, such as ALARM_THREAT.
      - User can export all agreed threats, where comparison_status is AGREEMENT_THREAT.
      - CSV exports include enough columns to reconstruct the filtered table context.
      - Export tests cover fixed exports, multiple comparison statuses, agreed threats, reviewed filters, and combined filters.

  - id: F-015
    title: Judge configuration and import diagnostics UI
    priority: must
    status: done
    depends_on: [F-005, F-008, F-009, F-013]
    acceptance:
      - User can create, view, update, and test Portkey gateway profiles from a settings view without exposing raw secrets.
      - User can configure Judge model settings used by evaluation jobs, including model name, routing mode, provider or config target, timeout, and temperature.
      - User can view and edit Judge system prompt and rubric through persisted prompt profiles with a visible prompt version hash.
      - Evaluation jobs persist the Portkey profile, prompt profile, prompt hash, model configuration, and timestamps used for the run.
      - User can start an evaluation job for an imported dataset from the web UI.
      - User can view paginated import errors by dataset, including row or record index, error code, message, and safe raw-record context.

  - id: F-016
    title: Scalable prompt and output search
    priority: should
    status: todo
    depends_on: [F-011, F-013]
    description: >
      Add search across stored source prompts and model outputs so analysts can
      quickly find attempts containing specific terms, phrases, jailbreak
      patterns, refusal text, or incident-specific indicators. The first slice
      should be easy to ship with substring search over existing persisted
      attempts, then evolve to PostgreSQL-backed indexed search for larger
      datasets.
    implementation_notes:
      - Start with GET /results/attempts query parameters for source_prompt_contains, source_output_contains, and q.
      - Apply filters server-side and preserve existing pagination and result explorer filters.
      - Escape user input and use parameterized SQL only; never construct raw SQL from search text.
      - Keep the first implementation read-only and avoid changing imported raw payloads.
      - Add UI search controls near the result explorer table with clear reset behavior.
      - For scale, add PostgreSQL trigram or full-text indexes after measuring ILIKE performance on realistic imports.
      - Prefer pg_trgm GIN indexes for substring/fuzzy matching across source_prompt and source_output.
      - Consider full-text search vectors later if analysts need language-aware token search and ranking.
      - Keep large-result exports paginated or streamed if search export is added later.
    acceptance:
      - User can search source prompts, source outputs, or both from the result explorer API.
      - Search can be combined with existing filters such as comparison status, input type, severity, category, and reviewed state.
      - Search results remain paginated and return total, limit, offset, and matching attempts.
      - UI exposes prompt/output search without exposing secrets or raw Judge payloads.
      - Unit and API tests cover prompt search, output search, combined q search, empty search, and search combined with filters.
      - A scale path is documented, including when to add pg_trgm or full-text indexes and the exact migration strategy.

  - id: F-017
    title: Evaluation error drilldown
    priority: should
    status: done
    depends_on: [F-010, F-011, F-013]
    description: >
      Let analysts understand the Automated triage Errors count without adding a
      separate mini-table. Error investigation should reuse the existing results
      table and attempt detail workflow by treating evaluation errors as a
      filterable result state.
    implementation_notes:
      - Make the Automated triage Errors metric clickable.
      - Clicking Errors applies comparison_status=EVALUATION_ERROR to the main result table.
      - Reuse the existing result explorer table instead of adding a separate dashboard error list.
      - Extend safe result rows or attempt details with evaluation_error_code, evaluation_error_message, and evaluation_error_created_at.
      - Do not expose raw gateway responses by default; raw responses require an explicit redaction policy before display.
      - Include a clear-filter action so users can return to the previous result table state.
      - Keep automated Judge disagreements as suspected issues, and label evaluation errors as technical failures rather than safety verdicts.
    acceptance:
      - User can click the Automated triage Errors metric to view EVALUATION_ERROR rows in the main result table.
      - Error rows show source prompt/output context plus safe error code and message.
      - Attempt detail panel displays safe evaluation error metadata.
      - User can clear the error filter and return to the normal result view.
      - Raw gateway payloads and secrets are not exposed in the UI.
      - API and UI tests cover error filtering, error detail display, and filter clearing.

  - id: F-018
    title: Project workspaces for scan imports
    priority: must
    status: done
    depends_on: [F-005, F-011, F-013]
    description: >
      Add project workspaces as user-facing containers for uploaded scan
      results. Each dataset import belongs to one project so analysts can
      separate previous scans by customer, application, assessment, campaign, or
      test run, then rename the scan or archive the project without changing
      preserved raw imported payloads.
    implementation_notes:
      - Introduce a persisted project/workspace model above datasets.
      - Require every dataset import to reference exactly one project/workspace.
      - Give every dataset import a user-facing scan name that can differ from the original filename.
      - Let upload create a new project/workspace, attach to an existing one, or create a default project and scan name from filename plus timestamp.
      - Keep dataset/import terminology internally where it already exists; use project/workspace as the user-facing organization layer.
      - Add project/workspace list, detail, rename, and archive endpoints.
      - Add scan import rename support without changing the dataset raw payload.
      - Prefer soft delete/archive for V1 and hide archived projects from default views.
      - Do not mutate raw imported payloads when renaming or archiving a project/workspace.
      - Scope dashboards, result explorer queries, import errors, evaluation jobs, and exports by project/workspace.
      - Prevent project/workspace archive while evaluation jobs are running, or define a safe cancellation policy before allowing it.
    acceptance:
      - User can create or select a project/workspace during file upload.
      - Upload without provided project/workspace and scan names creates default names from filename and timestamp.
      - Imported datasets are associated with exactly one project/workspace.
      - User can rename an uploaded scan import.
      - User can list project/workspaces with import counts and latest activity timestamp.
      - User can rename a project/workspace.
      - User can delete a project/workspace using V1 archive behavior, and archived projects are hidden from default project, dashboard, result, and export views.
      - Project/workspace-scoped dashboards, result explorer, import errors, evaluation jobs, and exports only include data from the selected project/workspace.
      - Archiving or renaming a project/workspace, or renaming a scan import, does not alter preserved raw imported payloads.
      - Backend and UI tests cover create-on-upload, attach-to-existing, default naming, scan rename, project rename, archive, and project-scoped result queries.

  - id: F-019
    title: Editable and deletable Judge configuration profiles
    priority: must
    status: todo
    depends_on: [F-015]
    description: >
      Let users manage existing Judge configuration objects from the Judge
      config menu. Loading an existing Portkey profile or prompt profile,
      changing fields, and clicking save must update that selected profile
      instead of creating a duplicate. Users can also delete or archive profiles
      that are no longer needed, subject to evaluation-history and running-job
      safety constraints.
    implementation_notes:
      - In the UI, distinguish create-new, edit-existing, duplicate, save changes, and delete actions.
      - When an existing Portkey profile is selected, Save Profile must call an update path for that profile ID rather than a create path.
      - When an existing prompt profile is selected, Save Prompt must call an update path for that profile ID rather than a create path.
      - Allow Portkey profile rename and updates to non-secret fields such as gateway URL, routing mode, provider slug, config ID, model, timeout, temperature, and metadata tags.
      - Preserve the existing Portkey API key when the secret input is blank or unchanged.
      - Replace the stored Portkey API key only when the user explicitly enters a new secret value.
      - Allow prompt profile rename and updates to system prompt and rubric fields.
      - Recompute and display the prompt version hash after saving prompt or rubric changes.
      - Add delete buttons with confirmation for Portkey profiles and prompt profiles.
      - Prefer archive/soft delete when a profile is referenced by historical evaluation jobs.
      - Block delete or archive for profiles referenced by running evaluation jobs unless a safe cancellation policy exists.
      - Never expose raw secrets in frontend state, API responses, logs, or test snapshots.
    acceptance:
      - User can load an existing Portkey profile, modify fields, save, and see the same profile updated.
      - Saving an edited Portkey profile does not create a duplicate.
      - Leaving the Portkey API key field blank preserves the existing stored secret.
      - Entering a new Portkey API key replaces the stored secret.
      - User can delete or archive an unused Portkey profile after confirmation.
      - User cannot delete or archive a Portkey profile used by a running evaluation job.
      - User can load an existing prompt profile, modify fields, save, and see the same profile updated.
      - Saving an edited prompt profile does not create a duplicate.
      - Prompt profile hash updates after system prompt or rubric changes.
      - User can delete or archive an unused prompt profile after confirmation.
      - User cannot delete or archive a prompt profile used by a running evaluation job.
      - UI clearly separates New, Save changes, Duplicate, and Delete actions.
      - Backend and UI tests cover update versus create, secret preservation, secret replacement, prompt hash update, delete/archive, and blocked delete for profiles in use.

  - id: F-020
    title: Parallel Judge evaluation workers
    priority: should
    status: todo
    depends_on: [F-009]
    description: >
      Allow multiple worker processes to evaluate Judge attempts in parallel
      without duplicate processing. PostgreSQL remains the work coordinator:
      workers atomically claim pending evaluation_job_attempt rows using short
      row-locking transactions, then call the Judge outside the transaction.
    implementation_notes:
      - Move from whole-job worker ownership toward attempt-level claiming for active evaluation jobs.
      - Claim small batches of PENDING or RETRYING evaluation_job_attempt rows with SELECT FOR UPDATE SKIP LOCKED.
      - Mark claimed rows RUNNING and commit immediately before making any Portkey or provider request.
      - Never hold database locks while waiting for LLM or gateway responses.
      - Make worker count and per-worker claim batch size configurable.
      - Support running N identical worker containers through Docker Compose scaling, for example docker compose up -d --scale worker=4.
      - Document how to increase, decrease, inspect, and tail worker containers with docker compose up --scale worker=N, docker compose ps, and docker compose logs -f worker.
      - Generate or configure a worker instance ID at startup for logs, claim metadata, and stale RUNNING recovery.
      - Keep worker count as an operator/runtime setting for V1 rather than a web UI control.
      - Do not let the web app directly start or stop Docker containers in V1; that would require orchestration privileges and stronger authorization/audit controls.
      - If web-controlled scaling is needed later, define it as a separate admin-only orchestration feature with authentication, authorization, audit logging, worker limits, and deployment-target support.
      - Add or verify indexes that support pending-attempt lookup, such as status, job_id, created_at, and id.
      - Recalculate job progress from evaluation_job_attempt statuses after attempts finish.
      - Ensure completed attempts produce at most one active Judge result for a given job attempt.
      - Recover stale RUNNING attempts after worker restart using a safe timeout or startup recovery policy.
      - Keep retry limits, temporary error handling, and evaluation error persistence compatible with parallel workers.
      - Add provider concurrency and rate-limit settings before increasing default worker count.
    acceptance:
      - Multiple worker processes can run at the same time without processing the same evaluation_job_attempt twice.
      - Worker claim transactions use row-level locking with SKIP LOCKED or an equivalent PostgreSQL-safe atomic claim.
      - Database locks are held only during claim/update transactions and not during Judge calls.
      - Worker count and claim batch size are configurable.
      - Operators can scale local worker containers with documented Docker Compose commands.
      - Operators can inspect running worker containers and view worker logs with documented Docker Compose commands.
      - The web UI does not expose worker start/stop controls in V1.
      - Parallel workers can process different attempts from the same large evaluation job.
      - Job progress remains accurate while multiple workers complete attempts concurrently.
      - Worker restart recovery returns stale RUNNING attempts to a retryable state without duplicating completed results.
      - Tests simulate concurrent workers claiming attempts and assert no duplicate Judge results are created.
      - Tests cover retry behavior, failed attempts, and progress recalculation under parallel processing.

  - id: F-021
    title: Scan and project evaluation progress UI
    priority: must
    status: done
    depends_on: [F-009, F-013, F-018]
    description: >
      Show clear loading and progress states while evaluations are pending,
      running, retrying, completed, or failed. Analysts should see ongoing
      progress at scan level and project level instead of wondering whether a
      Judge run is still active.
    implementation_notes:
      - Add scan-level evaluation status surfaces using existing job progress fields where possible.
      - Show total attempts, processed attempts, succeeded attempts, failed attempts, and remaining attempts.
      - Show project-level rollups across all visible scans in the selected project/workspace.
      - Poll job or project status while active evaluations are PENDING, RUNNING, or RETRYING.
      - Use progress bars for active scans and project summaries.
      - Keep progress UI compact and operational; avoid marketing-style layout.
      - Display technical evaluation failures as errors, not confirmed safety verdicts.
      - Provide clear completed and failed terminal states with retry affordances where already supported.
      - Do not expose raw Judge payloads, provider responses, prompts, outputs, or secrets in progress summaries.
    acceptance:
      - User can see when a scan evaluation is PENDING, RUNNING, RETRYING, COMPLETED, or FAILED.
      - User can see scan-level progress as processed attempts over total attempts.
      - User can see succeeded, failed, and remaining attempt counts for an active scan.
      - User can see project-level evaluation rollups for all visible scans in a project/workspace.
      - Progress updates automatically while evaluation jobs are active.
      - Completed and failed states are visually distinct from active loading states.
      - Progress UI does not expose raw prompts, outputs, Judge payloads, gateway responses, or secrets.
      - UI tests cover active progress, completed state, failed state, retrying state, and project-level rollups.

  - id: F-022
    title: Prevent duplicate active evaluations per scan and project
    priority: must
    status: todo
    depends_on: [F-009, F-013, F-018]
    description: >
      Prevent users from accidentally creating conflicting active evaluation
      runs for the same scan or project. The backend must enforce this rule so
      duplicate work cannot be created from multiple browser tabs, repeated
      clicks, or direct API calls; the UI should reflect the active state and
      ask users to wait until the current run reaches a terminal state.
    implementation_notes:
      - Treat PENDING, RUNNING, and RETRYING evaluation jobs as active.
      - Treat COMPLETED, FAILED, and CANCELLED evaluation jobs as terminal.
      - Reject creation of a new evaluation job for a scan/dataset that already has an active evaluation job.
      - For project/workspace-level starts, reject a new project evaluation if any scan in that project already has an active evaluation job.
      - Return a clear 409 Conflict response with the active job ID and safe progress metadata.
      - Disable or replace Start Evaluation actions in the UI when an active job already exists.
      - Display the active progress state instead of allowing repeated starts.
      - Allow explicit re-evaluation only after the previous job reaches a terminal state.
      - Keep failed-attempt retry behavior separate from starting a duplicate full evaluation.
      - Enforce duplicate prevention in backend services, not only in frontend state.
    acceptance:
      - API rejects a second active evaluation job for the same scan/dataset with 409 Conflict.
      - API rejects a project/workspace evaluation start when any scan in the project has an active evaluation job.
      - Conflict responses include the active job ID, status, total attempts, processed attempts, failed attempts, and remaining attempts.
      - UI disables or replaces Start Evaluation for scans with active jobs.
      - UI disables or replaces project-level evaluation start when the project has any active scan evaluation.
      - UI shows the active progress state and asks the user to wait until the current run finishes.
      - User can start a new full evaluation only after the previous job is COMPLETED, FAILED, or CANCELLED.
      - Retry failed attempts remains available through the existing retry flow and does not create a duplicate full evaluation.
      - Backend tests cover duplicate scan start, duplicate project start, terminal-state re-evaluation, and direct API calls.
      - UI tests cover repeated clicks, active-job disabled state, and conflict response handling.

recommended_delivery_order:
  - milestone: M0
    features: [F-001]
  - milestone: M1
    features: [F-002, F-003, F-004, F-005]
  - milestone: M2
    features: [F-007, F-008, F-009, F-010]
  - milestone: M3
    features: [F-011, F-012, F-013]
  - milestone: M4
    features: [F-006, F-014, F-016, F-017]
  - milestone: M5
    features: [F-018]
  - milestone: M6
    features: [F-019]
  - milestone: M7
    features: [F-020, F-021, F-022]
